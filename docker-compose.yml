version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: hadong_db
    environment:
      POSTGRES_DB: hadong_traffic
      POSTGRES_USER: trung
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trung -d hadong_traffic"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: hadong_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URI: postgresql://trung:123456@db:5432/hadong_traffic
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: hadong_traffic
      POSTGRES_USER: trung
      POSTGRES_PASSWORD: 123456
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    networks:
      - traffic_network

networks:
  traffic_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
